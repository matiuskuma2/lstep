name = "lstep-ai-api-prod"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# D1 Database binding
# database_id is set per environment below
[[d1_databases]]
binding = "DB"
database_name = "lstep-db"
database_id = "REPLACE_AFTER_D1_CREATION"

# Environment variables (non-secret)
[vars]
ENVIRONMENT = "production"

# Secrets (set via Cloudflare Dashboard or wrangler secret put):
#   - OPENAI_API_KEY
#   - ADMIN_JWT_SECRET
# Do NOT put secrets in this file.

# Cron triggers (uncomment when step delivery is ready)
# [triggers]
# crons = ["*/1 * * * *"]

# --- Staging environment ---
[env.staging]
name = "lstep-ai-api-stg"
[env.staging.vars]
ENVIRONMENT = "staging"

# Staging D1 (create a separate DB for staging if needed)
# [[env.staging.d1_databases]]
# binding = "DB"
# database_name = "lstep-db-stg"
# database_id = "REPLACE_AFTER_D1_STG_CREATION"
