name = "lstep-ai-api-prod"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
assets = { binding = "ASSETS", directory = "./public", not_found_handling = "none" }

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "lstep-db"
database_id = "f93fa9e9-684e-4ed1-b5bb-d53fbf1bef56"

# Environment variables (non-secret)
[vars]
ENVIRONMENT = "production"

# Secrets (set via Cloudflare Dashboard or wrangler secret put):
#   - OPENAI_API_KEY
#   - ADMIN_JWT_SECRET
#   - LINE_CHANNEL_SECRET
#   - LINE_CHANNEL_ACCESS_TOKEN
#   - API_KEY (for LINE Harness API auth)
# Do NOT put secrets in this file.

# Cron triggers for step delivery (every 5 minutes)
[triggers]
crons = ["*/5 * * * *"]

# --- Staging environment ---
[env.staging]
name = "lstep-ai-api-stg"
[env.staging.vars]
ENVIRONMENT = "staging"

[env.staging.triggers]
crons = ["*/5 * * * *"]

[[env.staging.d1_databases]]
binding = "DB"
database_name = "lstep-db"
database_id = "f93fa9e9-684e-4ed1-b5bb-d53fbf1bef56"
