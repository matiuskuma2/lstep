name: Run D1 Migration (friends_score)

on:
  push:
    paths:
      - '.github/workflows/migrate-friends-score.yml'

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Run migration
        run: wrangler d1 execute lstep-db --file=db/migrations/015_friends_add_score.sql --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
