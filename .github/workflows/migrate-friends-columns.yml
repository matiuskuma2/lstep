name: Run D1 Migration (friends_columns)

on:
  push:
    paths:
      - '.github/workflows/migrate-friends-columns.yml'

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Run migration
        run: wrangler d1 execute lstep-db --file=db/migrations/013_friends_add_line_harness_columns.sql --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Summary
        run: |
          echo "## D1 Migration Complete" >> $GITHUB_STEP_SUMMARY
          echo "- **File:** 013_friends_add_line_harness_columns.sql" >> $GITHUB_STEP_SUMMARY
          echo "- **Changes:** Added picture_url, status_message, is_following, score to friends" >> $GITHUB_STEP_SUMMARY
