name: Deploy Worker

on:
  push:
    branches:
      - main
      - staging
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Determine environment
        id: env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "target=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "target=production" >> $GITHUB_OUTPUT
          else
            echo "target=staging" >> $GITHUB_OUTPUT
          fi

      - name: Run D1 migrations (staging)
        if: steps.env.outputs.target == 'staging'
        run: |
          for f in db/migrations/*.sql; do
            echo "Running migration: $f"
            wrangler d1 execute lstep-db --env staging --file "$f" || true
          done
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to staging
        if: steps.env.outputs.target == 'staging'
        run: wrangler deploy --env staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set staging secrets
        if: steps.env.outputs.target == 'staging'
        run: |
          echo "${{ secrets.OPENAI_API_KEY }}" | wrangler secret put OPENAI_API_KEY --env staging
          echo "${{ secrets.ADMIN_JWT_SECRET }}" | wrangler secret put ADMIN_JWT_SECRET --env staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Run D1 migrations (production)
        if: steps.env.outputs.target == 'production'
        run: |
          for f in db/migrations/*.sql; do
            echo "Running migration: $f"
            wrangler d1 execute lstep-db --file "$f" || true
          done
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to production
        if: steps.env.outputs.target == 'production'
        run: wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set production secrets
        if: steps.env.outputs.target == 'production'
        run: |
          echo "${{ secrets.OPENAI_API_KEY }}" | wrangler secret put OPENAI_API_KEY
          echo "${{ secrets.ADMIN_JWT_SECRET }}" | wrangler secret put ADMIN_JWT_SECRET
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Post-deploy verification
        if: steps.env.outputs.target == 'staging'
        run: |
          echo "Waiting 30s for deploy to propagate..."
          sleep 30

          echo "## Post-Deploy Verification" >> $GITHUB_STEP_SUMMARY

          # Health check
          HEALTH=$(curl -s -o /dev/null -w "%{http_code}" https://lstep-ai-api-stg.yahoorilarc.workers.dev/health)
          if [ "$HEALTH" = "200" ]; then
            echo "- ✅ /health: $HEALTH" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ /health: $HEALTH" >> $GITHUB_STEP_SUMMARY
          fi

          # Verify endpoint
          VERIFY=$(curl -s https://lstep-ai-api-stg.yahoorilarc.workers.dev/api/verify 2>/dev/null || echo '{"status":"ERROR"}')
          OVERALL=$(echo "$VERIFY" | head -c 500)
          STATUS=$(echo "$VERIFY" | grep -o '"status":"[^"]*"' | head -1 | cut -d'"' -f4)
          PASSED=$(echo "$VERIFY" | grep -o '"passed":[0-9]*' | cut -d: -f2)
          FAILED=$(echo "$VERIFY" | grep -o '"failed":[0-9]*' | cut -d: -f2)
          TOTAL=$(echo "$VERIFY" | grep -o '"total":[0-9]*' | cut -d: -f2)

          echo "- **Overall:** $STATUS ($PASSED/$TOTAL passed, $FAILED failed)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "<details><summary>Full verification result</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          echo "$OVERALL" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY

          # Fail the job if critical checks fail
          if [ "$STATUS" = "FAIL" ]; then
            echo "::error::Post-deploy verification FAILED"
            exit 1
          fi

      - name: Post-deploy summary
        run: |
          echo "## Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** ${{ steps.env.outputs.target }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Secrets:** OPENAI_API_KEY, ADMIN_JWT_SECRET set" >> $GITHUB_STEP_SUMMARY
