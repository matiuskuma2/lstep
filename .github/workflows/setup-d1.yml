name: Setup D1 Database (one-time)

on:
  push:
    paths:
      - '.github/workflows/setup-d1.yml'

jobs:
  create-d1:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Install wrangler
        run: npm install -g wrangler

      - name: List existing D1 databases
        run: wrangler d1 list
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Create D1 database
        id: create
        run: |
          echo "Creating D1 database: lstep-db"
          OUTPUT=$(wrangler d1 create "lstep-db" 2>&1) || true
          echo "$OUTPUT"
          DB_ID=$(echo "$OUTPUT" | grep -oP '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -1)
          echo "database_id=$DB_ID" >> $GITHUB_OUTPUT
          echo "---"
          echo "Database ID: $DB_ID"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Summary
        run: |
          echo "## D1 Database Setup" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Database name:** lstep-db" >> $GITHUB_STEP_SUMMARY
          echo "- **Database ID:** ${{ steps.create.outputs.database_id }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Next: update \`wrangler.toml\` with the database_id above." >> $GITHUB_STEP_SUMMARY
