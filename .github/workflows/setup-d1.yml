name: Setup D1 Database

on:
  workflow_dispatch:
    inputs:
      db_name:
        description: 'D1 database name'
        required: true
        default: 'lstep-db'

jobs:
  create-d1:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Install wrangler
        run: npm install -g wrangler

      - name: List existing D1 databases
        run: wrangler d1 list
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Create D1 database
        run: |
          echo "Creating D1 database: ${{ github.event.inputs.db_name }}"
          wrangler d1 create "${{ github.event.inputs.db_name }}" 2>&1 | tee /tmp/d1_output.txt
          echo "---"
          echo "IMPORTANT: Copy the database_id from above and update wrangler.toml"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Show result
        run: |
          echo "## D1 Database Created" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Database name: ${{ github.event.inputs.db_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check the 'Create D1 database' step logs for the database_id." >> $GITHUB_STEP_SUMMARY
          echo "Update wrangler.toml with the database_id value." >> $GITHUB_STEP_SUMMARY
