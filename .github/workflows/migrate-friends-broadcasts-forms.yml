name: Run D1 Migration (friends_broadcasts_forms)

on:
  push:
    paths:
      - '.github/workflows/migrate-friends-broadcasts-forms.yml'

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: staging

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Run migration
        run: wrangler d1 execute lstep-db --file=db/migrations/005_friends_broadcasts_forms.sql --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Summary
        run: |
          echo "## D1 Migration Complete" >> $GITHUB_STEP_SUMMARY
          echo "- **Tables:** friends, broadcasts, forms" >> $GITHUB_STEP_SUMMARY
