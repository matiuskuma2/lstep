name: Run D1 Migration (auth_tenant)

on:
  push:
    paths:
      - '.github/workflows/migrate-auth-tenant.yml'

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: staging

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Run migration
        run: wrangler d1 execute lstep-db --file=db/migrations/002_auth_tenant.sql --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Summary
        run: |
          echo "## D1 Migration Complete" >> $GITHUB_STEP_SUMMARY
          echo "- **File:** db/migrations/002_auth_tenant.sql" >> $GITHUB_STEP_SUMMARY
          echo "- **Tables created:** tenants, users, tenant_settings" >> $GITHUB_STEP_SUMMARY
