name: Run D1 Migration (ai_execution_logs)

on:
  push:
    paths:
      - '.github/workflows/migrate-ai-logs.yml'

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Run migration
        run: wrangler d1 execute lstep-db --file=db/migrations/007_ai_execution_logs.sql --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Summary
        run: |
          echo "## D1 Migration Complete" >> $GITHUB_STEP_SUMMARY
          echo "- **File:** db/migrations/007_ai_execution_logs.sql" >> $GITHUB_STEP_SUMMARY
          echo "- **Tables created:** ai_execution_logs" >> $GITHUB_STEP_SUMMARY
