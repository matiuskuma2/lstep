name: Run D1 Migration (bot_system_prompt)

on:
  push:
    paths:
      - '.github/workflows/migrate-bot-system-prompt.yml'

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Run migration
        run: wrangler d1 execute lstep-db --file=db/migrations/008_bot_system_prompt.sql --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Summary
        run: |
          echo "## D1 Migration Complete" >> $GITHUB_STEP_SUMMARY
          echo "- **File:** db/migrations/008_bot_system_prompt.sql" >> $GITHUB_STEP_SUMMARY
          echo "- **Change:** Added system_prompt column to bots table" >> $GITHUB_STEP_SUMMARY
