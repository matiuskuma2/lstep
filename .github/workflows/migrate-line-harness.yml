name: Run D1 Migration (line_harness_schema)

on:
  push:
    paths:
      - '.github/workflows/migrate-line-harness.yml'

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Run migration
        run: wrangler d1 execute lstep-db --file=db/migrations/010_line_harness_full_schema.sql --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Summary
        run: |
          echo "## D1 Migration Complete" >> $GITHUB_STEP_SUMMARY
          echo "- **File:** db/migrations/010_line_harness_full_schema.sql" >> $GITHUB_STEP_SUMMARY
          echo "- **Tables:** LINE Harness full schema (39 tables including line_accounts)" >> $GITHUB_STEP_SUMMARY
