name: Codex Implement

on:
  issues:
    types: [labeled]

jobs:
  codex-implement:
    if: github.event.label.name == 'codex'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout staging
        uses: actions/checkout@v4
        with:
          ref: staging

      - name: Create feature branch
        run: |
          BRANCH="feature/issue-${{ github.event.issue.number }}-codex"
          git checkout -b "$BRANCH"
          echo "branch=$BRANCH" >> $GITHUB_ENV

      - name: Run Codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt: |
            Implement GitHub Issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}

            ${{ github.event.issue.body }}

            Read CLAUDE.md and docs/ for project rules.
            Keep changes minimal and reviewable.
            Create tests where appropriate.
            Do not broaden scope.

      - name: Check for changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "codex[bot]"
          git config user.email "codex[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Implement #${{ github.event.issue.number }}: ${{ github.event.issue.title }}"
          git push origin "${{ env.branch }}"

      - name: Create PR
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUM: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          printf '## Auto-generated by Codex\n\nReview checklist:\n- [ ] Scope matches issue\n- [ ] No direct DB writes\n- [ ] preview/confirm preserved\n- [ ] Tests added/updated\n\nCloses #%s\n' "${ISSUE_NUM}" > /tmp/pr-body.md
          gh pr create --base staging --head "${{ env.branch }}" --title "Implement #${ISSUE_NUM}: ${ISSUE_TITLE}" --body-file /tmp/pr-body.md

      - name: Comment on issue if no changes
        if: steps.changes.outputs.has_changes == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.issue.number }} \
            --body "Codex ran but produced no changes. Manual investigation may be needed."
