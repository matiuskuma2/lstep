name: Codex Implement

on:
  issues:
    types: [labeled]

jobs:
  codex-implement:
    if: github.event.label.name == 'codex'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: staging

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Create feature branch
        run: |
          BRANCH="codex/issue-${{ github.event.issue.number }}"
          git checkout -b "$BRANCH"
          echo "branch=$BRANCH" >> $GITHUB_ENV

      - name: Run Codex
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          ISSUE_TITLE="${{ github.event.issue.title }}"
          ISSUE_BODY="${{ github.event.issue.body }}"
          
          codex --quiet --approval-mode full-auto \
            "Implement GitHub Issue #${{ github.event.issue.number }}: ${ISSUE_TITLE}\n\n${ISSUE_BODY}\n\nRead CLAUDE.md and docs/ for project rules. Keep changes minimal. Create tests where appropriate."

      - name: Check for changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "codex[bot]"
          git config user.email "codex[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Implement #${{ github.event.issue.number }}: ${{ github.event.issue.title }}"
          git push origin "${{ env.branch }}"

      - name: Create PR
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base staging \
            --head "${{ env.branch }}" \
            --title "Implement #${{ github.event.issue.number }}: ${{ github.event.issue.title }}" \
            --body "## Auto-generated by Codex\n\nCloses #${{ github.event.issue.number }}\n\nReview checklist:\n- [ ] Scope matches issue\n- [ ] No direct DB writes\n- [ ] preview/confirm preserved\n- [ ] Tests added/updated\n- [ ] Cloudflare staging deploy succeeded"

      - name: Comment on issue if no changes
        if: steps.changes.outputs.has_changes == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.issue.number }} \
            --body "Codex ran but produced no changes. Manual investigation may be needed."
