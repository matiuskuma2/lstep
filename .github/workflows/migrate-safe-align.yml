name: Run D1 Migration (safe_align_line_harness)

on:
  push:
    paths:
      - '.github/workflows/migrate-safe-align.yml'

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Run migration
        run: wrangler d1 execute lstep-db --file=db/migrations/012_safe_align_line_harness.sql --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Summary
        run: |
          echo "## D1 Migration Complete" >> $GITHUB_STEP_SUMMARY
          echo "- **File:** 012_safe_align_line_harness.sql" >> $GITHUB_STEP_SUMMARY
          echo "- **Changes:** CREATE new LINE Harness tables only (no ALTER)" >> $GITHUB_STEP_SUMMARY
