name: Run D1 Migration

on:
  workflow_dispatch:
    inputs:
      migration_file:
        description: 'Migration file path (e.g. db/migrations/001_tracked_links.sql)'
        required: true
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Run migration
        run: |
          if [ "${{ github.event.inputs.environment }}" = "staging" ]; then
            wrangler d1 execute lstep-db --file=${{ github.event.inputs.migration_file }} --remote
          else
            wrangler d1 execute lstep-db --file=${{ github.event.inputs.migration_file }} --remote
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Summary
        run: |
          echo "## D1 Migration" >> $GITHUB_STEP_SUMMARY
          echo "- **File:** ${{ github.event.inputs.migration_file }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** ${{ github.event.inputs.environment }}" >> $GITHUB_STEP_SUMMARY
